services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: algopay_e2e
      POSTGRES_PASSWORD: algopay_e2e
      POSTGRES_DB: algopay_e2e
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U algopay_e2e"]
      interval: 2s
      timeout: 5s
      retries: 10

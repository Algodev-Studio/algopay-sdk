site_name: AlgoPay SDK
site_description: Payment infrastructure for AI agents on Algorand — USDC, x402, guards, ledger.
site_url: https://algodev-studio.github.io/algopay-sdk/
repo_url: https://github.com/Algodev-Studio/algopay-sdk
repo_name: Algodev-Studio/algopay-sdk
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - User guide:
      - Wallets: guides/wallets.md
      - Payments & routing: guides/payments.md
      - x402 HTTP payments: guides/x402.md
      - Guards: guides/guards.md
      - Intents & batch: guides/intents-batch.md
      - Ledger & storage: guides/ledger-storage.md
  - Reference:
      - API: reference/api.md
      - Environment variables: ENVIRONMENT.md
  - Project:
      - Publishing (PyPI): PUBLISHING.md
      - Testing roadmap: TESTING_ROADMAP.md
      - Legacy OmniAgentPay / arc-merchant: REFERENCE_LEGACY_OMNIAGENTPAY_AND_ARC_MERCHANT.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            members_order: source
            separate_signature: true

markdown_extensions:
  # Required so Material "grid cards" and other HTML blocks parse inner Markdown
  # (icons :material-*:, lists, links). Without this, raw syntax shows on the page.
  - md_in_html
  - attr_list
  - admonition
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/algopay-sdk/
      name: algopay-sdk on PyPI

copyright: Copyright &copy; AlgoPay contributors — MIT License

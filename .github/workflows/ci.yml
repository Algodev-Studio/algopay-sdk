name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Python package (editable)
        working-directory: python
        run: pip install -e ".[dev]"
      - name: Build wheel and verify algopay package is included
        working-directory: python
        run: |
          pip install build
          python -m build
          python scripts/check_wheel.py
      - name: Ruff
        working-directory: python
        run: ruff check src tests
      - name: Pytest with coverage
        working-directory: python
        run: pytest --cov=algopay --cov-report=term-missing --cov-report=xml -m "not integration"
      - name: Mypy (informational)
        working-directory: python
        run: mypy src/algopay
        continue-on-error: true

  js:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: algopay_e2e
          POSTGRES_PASSWORD: algopay_e2e
          POSTGRES_DB: algopay_e2e
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U algopay_e2e"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install
        run: npm ci
      - name: Build TypeScript SDK
        run: npm run build --workspace=@algodev-studio/algopay
      - name: Test TypeScript SDK
        run: npm run test:js
      - name: Prisma generate + Next build
        env:
          DATABASE_URL: "postgresql://algopay_e2e:algopay_e2e@localhost:5433/algopay_e2e?schema=public"
          DIRECT_URL: "postgresql://algopay_e2e:algopay_e2e@localhost:5433/algopay_e2e?schema=public"
          SESSION_SECRET: "0123456789abcdef0123456789abcdef"
          ALGOPAY_VAULT_MASTER_KEY: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
        run: |
          npx prisma generate --schema=pay/prisma/schema.prisma
          npm run build --workspace=algopay-console
      - name: Install Playwright browsers
        working-directory: pay
        run: npx playwright install --with-deps chromium
      - name: Playwright E2E (pay dashboard)
        working-directory: pay
        env:
          DATABASE_URL: "postgresql://algopay_e2e:algopay_e2e@localhost:5433/algopay_e2e?schema=public"
          DIRECT_URL: "postgresql://algopay_e2e:algopay_e2e@localhost:5433/algopay_e2e?schema=public"
          SESSION_SECRET: "0123456789abcdef0123456789abcdef"
          ALGOPAY_VAULT_MASTER_KEY: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
          CI: "true"
        run: npm run test:e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: pay/playwright-report/
          retention-days: 7

  community-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python package
        working-directory: python
        run: pip install -e ".[dev]"
      - name: Community example smoke (mock mode)
        run: python python/scripts/smoke_community_examples.py

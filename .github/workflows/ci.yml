name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Python package (editable)
        working-directory: python
        run: pip install -e ".[dev]"
      - name: Ruff
        working-directory: python
        run: ruff check src tests
      - name: Pytest with coverage
        working-directory: python
        run: pytest --cov=algopay --cov-report=term-missing --cov-report=xml -m "not integration"
      - name: Mypy (informational)
        working-directory: python
        run: mypy src/algopay
        continue-on-error: true

  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install
        run: npm ci
      - name: Build TypeScript SDK
        run: npm run build --workspace=@algodev-studio/algopay
      - name: Test TypeScript SDK
        run: npm run test:js
      - name: Prisma generate + Next build
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci?schema=public"
          DIRECT_URL: "postgresql://ci:ci@localhost:5432/ci?schema=public"
          SESSION_SECRET: "0123456789abcdef0123456789abcdef"
          ALGOPAY_VAULT_MASTER_KEY: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
        run: |
          npx prisma generate --schema=pay/prisma/schema.prisma
          npm run build --workspace=algopay-console
